<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>КРУГОБОТ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- Главный экран -->
        <div id="main-screen" class="screen active">
            <div class="header">
                <h1>🎲 КРУГОБОТ</h1>
                <p id="user-greeting"></p>
            </div>
            <div class="menu-grid">
                <button class="menu-btn" id="record-btn">🎥 Записать кружок</button>
                <button class="menu-btn" id="watch-btn">▶️ Смотреть</button>
                <button class="menu-btn" id="rules-btn">📜 Правила</button>
                <button class="menu-btn" id="support-btn">🆘 Поддержка</button>
            </div>
            <div id="video-preview" style="display:none; margin-top:20px;">
                <video id="preview" autoplay playsinline style="width:100%; border-radius:16px;"></video>
                <button id="stop-record" style="margin-top:10px;">⏹ Стоп запись</button>
            </div>
        </div>

        <!-- Экран просмотра -->
        <div id="watch-screen" class="screen">
            <h2>🎥 Смотрим кружки</h2>
            <div class="video-container">
                <video id="current-video" loop playsinline controls></video>
                <div class="video-badge" id="video-badge"></div>
            </div>
            <div class="video-controls">
                <button class="control-btn" id="like-btn">❤️ Лайк</button>
                <button class="control-btn" id="reply-btn">💬 Ответить</button>
                <button class="control-btn" id="next-btn">⏩ Далее</button>
                <button class="control-btn" id="report-btn">🚨 Жалоба</button>
            </div>
            <button class="back-btn" id="back-from-watch">← Назад</button>
        </div>

        <!-- Экран правил -->
        <div id="rules-screen" class="screen">
            <h2>📜 Правила</h2>
            <div class="rules-text">
                <p>— Запрещён спам</p>
                <p>— Запрещён запрещённый контент</p>
                <p>— Уважайте других</p>
                <p>— 10 жалоб = бан</p>
            </div>
            <button class="back-btn" id="back-from-rules">← Назад</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
